name: Visitor ML Pipeline & Profile Activity Boost

on:
  schedule:
    # Runs every 12 hours (at 00:00 and 12:00 UTC)
    - cron: '0 */12 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install ML and Pipeline dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy scikit-learn matplotlib requests

      - name: Run ML Analytics Pipeline
        run: |
          python pipeline/visitor_pipeline.py

      - name: Commit and Push ML updates (Daily Contribution Boost)
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/visitor_stats.json assets/traffic_forecast.png assets/visitor_segments.png
          
          # Check if there are changes staged
          if git diff --cached --quiet; then
            echo "No changes in ML outputs to commit."
          else
            git commit -m "Auto-update: Live visitor analytics & ML forecast models"
            git push origin main
          fi
