name: Contact Form Email Notification

on:
  repository_dispatch:
    types: [contact_submission]

jobs:
  send-email:
    runs-on: ubuntu-latest
    steps:
      - name: Send Email Notification via Gmail SMTP
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.GMAIL_USER }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          subject: New Portfolio Message from ${{ github.event.client_payload.name }}
          to: djogiya786@gmail.com
          from: djogiya786@gmail.com
          body: |
            You have received a new contact message from your portfolio website.
            
            Name: ${{ github.event.client_payload.name }}
            Email: ${{ github.event.client_payload.email }}
            
            Message:
            ${{ github.event.client_payload.message }}
